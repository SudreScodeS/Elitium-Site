<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Elitium ERP</title>
  <meta name="description" content="Página não encontrada.">
  <meta name="theme-color" content="#7c5cbf">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#09090b;--text:#fafafa;--text-secondary:#a1a1aa;--text-muted:#52525b;--accent:#7c5cbf;--accent-light:#a78bfa;--accent-glow:rgba(124,92,191,.12);--border:#27272a;--border-subtle:#1e1e22;--transition:.3s cubic-bezier(.4,0,.2,1)}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
    nav{padding:20px 0}
    nav .container{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
    .nav-logo svg{height:28px;width:auto}
    .nav-logo span{font-weight:800;font-size:18px;letter-spacing:-.03em}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    .error-page{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px 24px;position:relative}
    .error-glow{position:absolute;border-radius:50%;filter:blur(120px);opacity:.3;pointer-events:none}
    .error-glow-1{top:20%;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(124,92,191,.2) 0%,transparent 70%);width:600px;height:400px}
    .error-content{position:relative;z-index:1}
    .error-code{font-size:clamp(100px,15vw,180px);font-weight:900;letter-spacing:-.06em;line-height:1;background:linear-gradient(135deg,var(--accent-light),#c4b5fd,var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
    .error-title{font-size:clamp(22px,3vw,32px);font-weight:700;margin-bottom:12px;letter-spacing:-.02em}
    .error-desc{font-size:16px;color:var(--text-secondary);max-width:420px;margin:0 auto 36px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:all var(--transition);cursor:pointer;border:none;font-family:inherit}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 0 0 rgba(124,92,191,.15)}
    .btn-primary:hover{background:var(--accent-light);box-shadow:0 0 24px rgba(124,92,191,.25);transform:translateY(-1px)}
    .btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border);margin-left:12px}
    .btn-ghost:hover{color:var(--text);border-color:var(--text-muted)}
    footer{border-top:1px solid var(--border-subtle);padding:24px 0}
    .footer-content{display:flex;align-items:center;justify-content:space-between}
    .footer-left{display:flex;align-items:center;gap:10px}
    .footer-left svg{height:20px}
    .footer-left span{font-size:13px;color:var(--text-muted)}
    .footer-links{display:flex;gap:20px;list-style:none}
    .footer-links a{color:var(--text-muted);text-decoration:none;font-size:13px;transition:color var(--transition)}
    .footer-links a:hover{color:var(--text-secondary)}
    @media(max-width:768px){.footer-content{flex-direction:column;gap:12px;text-align:center}.footer-links{flex-wrap:wrap;justify-content:center}.btn-ghost{margin-left:0;margin-top:12px}}
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="nav-logo">
        <svg viewBox="0 0 290 369" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M244.974 227.739L290 257.947V105.316L244.974 136.337V227.739Z" fill="#7c5cbf"/>
          <path d="M0 90.3301L143.535 0L290 90.3301C275.354 100.043 244.974 122.487 244.974 122.487C244.974 124.818 177.71 82.5598 143.535 61.1914L49.798 122.383V180.66L0 212.713V90.3301Z" fill="#fafafa"/>
          <path d="M216.768 154.435L164.04 122.383L0 228.739V284.103L143.535 368.605L290 273.904L244.974 244.592L143.535 305.957L54.1919 256.421L216.768 154.435Z" fill="#fafafa"/>
        </svg>
        <span>Elitium</span>
      </a>
    </div>
  </nav>

  <section class="error-page">
    <div class="error-glow error-glow-1"></div>
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Página não encontrada</h1>
      <p class="error-desc">O endereço que você procura não existe ou foi movido. Que tal voltar para a página inicial?</p>
      <a href="/" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Voltar ao início
      </a>
      <a href="https://github.com/SudreScodeS/Elitium-ERP" target="_blank" class="btn btn-ghost">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6.02 0c2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.7.82.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
        Ver no GitHub
      </a>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-left">
          <svg viewBox="0 0 290 369" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:18px">
            <path d="M244.974 227.739L290 257.947V105.316L244.974 136.337V227.739Z" fill="#7c5cbf"/>
            <path d="M0 90.3301L143.535 0L290 90.3301C275.354 100.043 244.974 122.487 244.974 122.487C244.974 124.818 177.71 82.5598 143.535 61.1914L49.798 122.383V180.66L0 212.713V90.3301Z" fill="#52525b"/>
            <path d="M216.768 154.435L164.04 122.383L0 228.739V284.103L143.535 368.605L290 273.904L244.974 244.592L143.535 305.957L54.1919 256.421L216.768 154.435Z" fill="#52525b"/>
          </svg>
          <span>&copy; 2025 Elitium ERP</span>
        </div>
        <ul class="footer-links">
          <li><a href="/">Início</a></li>
          <li><a href="https://github.com/SudreScodeS/Elitium-ERP" target="_blank">GitHub</a></li>
        </ul>
      </div>
    </div>
  </footer>
</body>
</html>
